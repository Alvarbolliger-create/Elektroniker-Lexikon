<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320">
  <defs>
    <!-- Pfeilspitzen -->
    <marker id="arr-blau" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#0284c7"/>
    </marker>
    <marker id="arr-rot" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#dc2626"/>
    </marker>
    <marker id="arr-gruen" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#16a34a"/>
    </marker>
    <marker id="arr-grau" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- ── Linke Hälfte: Basisfall R, L, C ── -->
  <!-- Achsen -->
  <line x1="30" y1="160" x2="220" y2="160" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="125" y1="60"  x2="125" y2="260" stroke="#e2e8f0" stroke-width="1"/>
  <text x="125" y="285" font-family="sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Zeigerdiagramm</text>

  <!-- Referenz: Stromzeiger I (grau, waagrecht) -->
  <line x1="125" y1="160" x2="195" y2="160" stroke="#64748b" stroke-width="2" marker-end="url(#arr-grau)"/>
  <text x="198" y="156" font-family="sans-serif" font-size="11" fill="#64748b">I</text>

  <!-- U_R: in Phase mit I (blau, waagrecht) -->
  <line x1="125" y1="160" x2="185" y2="160" stroke="#0284c7" stroke-width="2.5" marker-end="url(#arr-blau)"/>
  <text x="155" y="150" font-family="sans-serif" font-size="11" fill="#0284c7">U_R</text>

  <!-- U_L: 90° vor I (blau, nach oben) -->
  <line x1="125" y1="160" x2="125" y2="95" stroke="#0284c7" stroke-width="2.5" stroke-dasharray="5,3" marker-end="url(#arr-blau)"/>
  <text x="130" y="90" font-family="sans-serif" font-size="11" fill="#0284c7">U_L (+90°)</text>

  <!-- U_C: 90° nach I (blau, nach unten) -->
  <line x1="125" y1="160" x2="125" y2="225" stroke="#0284c7" stroke-width="2.5" stroke-dasharray="5,3" marker-end="url(#arr-blau)"/>
  <text x="130" y="242" font-family="sans-serif" font-size="11" fill="#0284c7">U_C (−90°)</text>

  <!-- Winkel-Beschriftung -->
  <path d="M 155,160 A 30,30 0 0,0 125,130" stroke="#0284c7" stroke-width="1" fill="none"/>
  <text x="158" y="145" font-family="sans-serif" font-size="10" fill="#0284c7">90°</text>

  <!-- ── Rechte Hälfte: RLC Zeigeraddition ── -->
  <!-- Achsen -->
  <line x1="270" y1="160" x2="460" y2="160" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="300" y1="60"  x2="300" y2="260" stroke="#e2e8f0" stroke-width="1"/>
  <text x="365" y="285" font-family="sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">RLC-Summe</text>

  <!-- Stromzeiger I (Referenz) -->
  <line x1="300" y1="160" x2="370" y2="160" stroke="#64748b" stroke-width="2" marker-end="url(#arr-grau)"/>
  <text x="373" y="156" font-family="sans-serif" font-size="11" fill="#64748b">I</text>

  <!-- U_R horizontal (blau) -->
  <line x1="300" y1="160" x2="380" y2="160" stroke="#0284c7" stroke-width="2" marker-end="url(#arr-blau)"/>
  <text x="335" y="175" font-family="sans-serif" font-size="10" fill="#0284c7">U_R</text>

  <!-- U_L senkrecht nach oben (hellblau gestrichelt) -->
  <line x1="380" y1="160" x2="380" y2="100" stroke="#0284c7" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arr-blau)"/>
  <text x="385" y="128" font-family="sans-serif" font-size="10" fill="#0284c7">U_L</text>

  <!-- U_ges: Resultierende (dicker blau diagonal) -->
  <line x1="300" y1="160" x2="380" y2="100" stroke="#0284c7" stroke-width="3" marker-end="url(#arr-blau)"/>
  <text x="326" y="118" font-family="sans-serif" font-size="11" fill="#0284c7" font-weight="bold">U</text>

  <!-- Winkel phi -->
  <path d="M 330,160 A 30,30 0 0,0 315,136" stroke="#dc2626" stroke-width="1.2" fill="none"/>
  <text x="337" y="150" font-family="sans-serif" font-size="10" fill="#dc2626">φ</text>

  <!-- Hilfslinien (grau gestrichelt) -->
  <line x1="300" y1="100" x2="380" y2="100" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Legende -->
  <rect x="270" y="55" width="120" height="50" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="278" y1="68" x2="295" y2="68" stroke="#0284c7" stroke-width="2"/>
  <text x="298" y="72" font-family="sans-serif" font-size="10" fill="#0284c7">Spannung</text>
  <line x1="278" y1="83" x2="295" y2="83" stroke="#64748b" stroke-width="2"/>
  <text x="298" y="87" font-family="sans-serif" font-size="10" fill="#64748b">Strom</text>
  <line x1="278" y1="98" x2="295" y2="98" stroke="#0284c7" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="298" y="102" font-family="sans-serif" font-size="10" fill="#0284c7">Komponente</text>
</svg>
