<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 270 125" width="270" height="125">

  <!-- Spannungsquelle -->
  <line x1="20" y1="35" x2="20" y2="52" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="20" cy="70" r="18" fill="none" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="20" y1="56" x2="20" y2="84" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="8" y1="61" x2="14" y2="61" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="11" y1="58" x2="11" y2="64" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="88" x2="20" y2="105" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Obere Schiene zu R1 -->
  <line x1="20" y1="35" x2="70" y2="35" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- R1 -->
  <rect x="70" y="28" width="36" height="14" fill="none" stroke="#1e293b" stroke-width="1.5"/>

  <!-- Obere Schiene zur Ecke -->
  <line x1="106" y1="35" x2="210" y2="35" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Draht von Ecke zu C1 -->
  <line x1="210" y1="35" x2="210" y2="58" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- C1 -->
  <line x1="195" y1="58" x2="225" y2="58" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="195" y1="78" x2="225" y2="78" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Draht von C1 zur unteren Schiene -->
  <line x1="210" y1="78" x2="210" y2="105" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Untere Schiene zurueck zur Quelle -->
  <line x1="210" y1="105" x2="20" y2="105" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <text x="88" y="18" font-size="11" font-family="sans-serif" fill="#1e293b" text-anchor="middle" dominant-baseline="middle">R1</text>
  <text x="241" y="72" font-size="11" font-family="sans-serif" fill="#1e293b" text-anchor="start" dominant-baseline="middle">C1</text>

</svg>
