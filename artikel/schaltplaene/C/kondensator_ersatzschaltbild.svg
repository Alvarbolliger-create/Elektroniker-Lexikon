<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 120" width="310" height="120">

  <!-- Anschluss links -->
  <line x1="20" y1="85" x2="45" y2="85" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="20" cy="85" r="3" fill="white" stroke="#1e293b" stroke-width="1.5"/>

  <!-- ESR -->
  <rect x="45" y="78" width="36" height="14" fill="none" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="81" y1="85" x2="101" y2="85" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- ESL (Spule, 4 Halbkreise) -->
  <path d="M 101,85 A 10,10 0 0 1 121,85
           A 10,10 0 0 1 141,85
           A 10,10 0 0 1 161,85
           A 10,10 0 0 1 181,85" fill="none" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="181" y1="85" x2="201" y2="85" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Knoten A -->
  <circle cx="201" cy="85" r="2.5" fill="#1e293b"/>

  <!-- C -->
  <line x1="201" y1="85" x2="221" y2="85" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="221" y1="70" x2="221" y2="100" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="237" y1="70" x2="237" y2="100" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="237" y1="85" x2="257" y2="85" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Knoten B -->
  <circle cx="257" cy="85" r="2.5" fill="#1e293b"/>

  <!-- Anschluss rechts -->
  <line x1="257" y1="85" x2="282" y2="85" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="282" cy="85" r="3" fill="white" stroke="#1e293b" stroke-width="1.5"/>

  <!-- R_leck: Zweig parallel zu C, gestrichelt (parasitaeres Element) -->
  <line x1="201" y1="85" x2="201" y2="40" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="201" y1="40" x2="211" y2="40" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="211" y="33" width="36" height="14" fill="none" stroke="#1e293b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="247" y1="40" x2="257" y2="40" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="257" y1="40" x2="257" y2="85" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Beschriftungen -->
  <text x="63" y="65" font-size="11" font-family="sans-serif" fill="#1e293b" text-anchor="middle" dominant-baseline="middle">ESR</text>
  <text x="141" y="65" font-size="11" font-family="sans-serif" fill="#1e293b" text-anchor="middle" dominant-baseline="middle">ESL</text>
  <text x="229" y="65" font-size="11" font-family="sans-serif" fill="#1e293b" text-anchor="middle" dominant-baseline="middle">C</text>
  <text x="229" y="23" font-size="11" font-family="sans-serif" fill="#1e293b" text-anchor="middle" dominant-baseline="middle">R<tspan font-size="8" baseline-shift="sub">leck</tspan></text>

</svg>
