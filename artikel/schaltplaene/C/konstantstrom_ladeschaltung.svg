<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 125" width="200" height="125">

  <!-- Konstantstromquelle -->
  <line x1="20" y1="35" x2="20" y2="52" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="20" cy="70" r="18" fill="none" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="7" y1="70" x2="33" y2="70" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="8" y1="61" x2="14" y2="61" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="11" y1="58" x2="11" y2="64" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="88" x2="20" y2="105" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Obere Schiene zur Ecke -->
  <line x1="20" y1="35" x2="140" y2="35" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Draht von Ecke zu C1 -->
