<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 245" width="300" height="245">

  <!-- VCC -->
  <line x1="240" y1="14" x2="240" y2="50" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>
  <text x="222" y="12" font-family="sans-serif" font-size="12" font-weight="bold" fill="#374151">VCC</text>

  <!-- R_C (vertikal) -->
  <rect x="227" y="50" width="26" height="44" stroke="#1e293b" stroke-width="2" fill="#f8fafc" rx="2"/>
  <text x="258" y="76" font-family="sans-serif" font-size="12" fill="#374151">R_C</text>

  <!-- Draht: R_C unten → Kollektor -->
  <line x1="240" y1="94" x2="240" y2="105" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>

  <!-- BJT NPN: Basis-Balken -->
  <line x1="182" y1="112" x2="182" y2="178" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>

  <!-- Kollektor-Diagonale (oben rechts) -->
  <line x1="182" y1="122" x2="240" y2="105" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Emitter-Diagonale (unten rechts) -->
  <line x1="182" y1="168" x2="240" y2="195" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Emitter-Pfeil: P=start+0.8v=(228.4,189.6), Flügel=P±0.1L·v⊥, L≈63.98, v⊥=(-0.422,0.907) -->
  <polygon points="240,195 231.1,183.8 225.7,195.4" fill="#1e293b"/>

  <!-- Draht: Emitter → GND -->
  <line x1="240" y1="195" x2="240" y2="212" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>

  <!-- GND-Symbol -->
  <line x1="216" y1="212" x2="264" y2="212" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="222" y1="219" x2="258" y2="219" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
  <line x1="229" y1="226" x2="251" y2="226" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Basis-Draht (von Balken nach links zu R_B) -->
  <line x1="100" y1="145" x2="182" y2="145" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>

  <!-- R_B (horizontal) -->
  <rect x="22" y="136" width="78" height="18" stroke="#1e293b" stroke-width="2" fill="#f8fafc" rx="2"/>
  <text x="47" y="130" font-family="sans-serif" font-size="12" fill="#374151">R_B</text>

  <!-- IN-Anschluss -->
  <line x1="8" y1="145" x2="22" y2="145" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>
  <text x="2" y="140" font-family="sans-serif" font-size="11" fill="#374151">IN</text>

  <!-- Anschluss-Labels -->
  <text x="162" y="108" font-family="sans-serif" font-size="11" fill="#374151">C</text>
  <text x="162" y="150" font-family="sans-serif" font-size="11" fill="#374151">B</text>
  <text x="162" y="182" font-family="sans-serif" font-size="11" fill="#374151">E</text>

  <!-- Strom-Labels (rot) -->
  <text x="248" y="72" font-family="sans-serif" font-size="11" fill="#dc2626">I_C</text>
  <text x="110" y="162" font-family="sans-serif" font-size="11" fill="#dc2626">I_B</text>
  <text x="248" y="210" font-family="sans-serif" font-size="11" fill="#dc2626">I_E</text>

</svg>
