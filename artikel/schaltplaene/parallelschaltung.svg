<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 175" width="660" height="175">
  <defs>
    <marker id="arr-rot" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- Spannungsquelle -->
  <circle cx="52" cy="88" r="22" stroke="#1e293b" stroke-width="2" fill="#f8fafc"/>
  <text x="44" y="83" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1e293b">+</text>
  <text x="46" y="101" font-family="sans-serif" font-size="15" fill="#1e293b">−</text>
  <text x="79" y="92" font-family="sans-serif" font-size="13" fill="#0284c7">U</text>

  <!-- Drähte von Quelle zu Bussen -->
  <line x1="52" y1="66" x2="52" y2="22" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="52" y1="110" x2="52" y2="154" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Oberer Bus -->
  <line x1="52" y1="22" x2="600" y2="22" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Unterer Bus -->
  <line x1="52" y1="154" x2="600" y2="154" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Rechte Seite -->
  <line x1="600" y1="22" x2="600" y2="154" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>

  <!-- R1 (vertikal) bei x=180 -->
  <line x1="180" y1="22" x2="180" y2="58" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>
  <rect x="166" y="58" width="28" height="64" stroke="#1e293b" stroke-width="2" fill="#f8fafc" rx="2"/>
  <line x1="180" y1="122" x2="180" y2="154" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>
  <text x="200" y="93" font-family="sans-serif" font-size="12" fill="#374151">R1</text>

  <!-- R2 (vertikal) bei x=340 -->
  <line x1="340" y1="22" x2="340" y2="58" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>
  <rect x="326" y="58" width="28" height="64" stroke="#1e293b" stroke-width="2" fill="#f8fafc" rx="2"/>
  <line x1="340" y1="122" x2="340" y2="154" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>
  <text x="360" y="93" font-family="sans-serif" font-size="12" fill="#374151">R2</text>

  <!-- R3 (vertikal) bei x=500 -->
  <line x1="500" y1="22" x2="500" y2="58" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>
  <rect x="486" y="58" width="28" height="64" stroke="#1e293b" stroke-width="2" fill="#f8fafc" rx="2"/>
  <line x1="500" y1="122" x2="500" y2="154" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>
  <text x="520" y="93" font-family="sans-serif" font-size="12" fill="#374151">R3</text>

  <!-- Strom-Pfeile rot (je Zweig) -->
  <line x1="180" y1="40" x2="180" y2="54" stroke="#dc2626" stroke-width="1.8" marker-end="url(#arr-rot)"/>
  <text x="186" y="50" font-family="sans-serif" font-size="11" fill="#dc2626">I₁</text>

  <line x1="340" y1="40" x2="340" y2="54" stroke="#dc2626" stroke-width="1.8" marker-end="url(#arr-rot)"/>
  <text x="346" y="50" font-family="sans-serif" font-size="11" fill="#dc2626">I₂</text>

  <line x1="500" y1="40" x2="500" y2="54" stroke="#dc2626" stroke-width="1.8" marker-end="url(#arr-rot)"/>
  <text x="506" y="50" font-family="sans-serif" font-size="11" fill="#dc2626">I₃</text>

  <!-- Gesamt-Strom links (rot) -->
  <line x1="52" y1="40" x2="52" y2="54" stroke="#dc2626" stroke-width="1.8" marker-end="url(#arr-rot)"/>
  <text x="58" y="50" font-family="sans-serif" font-size="11" fill="#dc2626">I</text>
</svg>
