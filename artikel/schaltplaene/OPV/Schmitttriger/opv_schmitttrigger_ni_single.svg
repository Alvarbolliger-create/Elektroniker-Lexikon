<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 310" width="420" height="310">

  <defs>
    <marker id="pfeil" markerWidth="8" markerHeight="8" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- Ue Anschluss (rot: Signalpfad zum "+"-Eingang) -->
  <circle cx="40" cy="55" r="3" fill="white" stroke="#dc2626" stroke-width="1.5"/>
  <line x1="40" y1="55" x2="70" y2="55" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/>

  <!-- R1 -->
  <rect x="70" y="48" width="40" height="14" fill="none" stroke="#1e293b" stroke-width="1.5"/>
  <text x="90" y="38" font-size="12" font-family="sans-serif" fill="#1e293b" text-anchor="middle">R1</text>
  <line x1="110" y1="55" x2="150" y2="55" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Knoten: R1 | R2 | "+"-Eingang (rot) -->
  <circle cx="150" cy="55" r="2.5" fill="#dc2626"/>

  <!-- R2: Rueckkopplung Knoten -> Ausgang (schwarz) -->
  <line x1="150" y1="55" x2="180" y2="55" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="180" y="48" width="40" height="14" fill="none" stroke="#1e293b" stroke-width="1.5"/>
  <text x="200" y="38" font-size="12" font-family="sans-serif" fill="#1e293b" text-anchor="middle">R2</text>
  <line x1="220" y1="55" x2="250" y2="55" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="250" y1="55" x2="250" y2="180" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Knoten -> "+"-Eingang (rot, senkrecht) -->
  <line x1="150" y1="55" x2="150" y2="169" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Referenzteiler: VRef -> R3 -> Knoten U_In- -> R4 -> untere Schiene -->
  <text x="100" y="119" font-size="13" font-family="sans-serif" fill="#1e293b" text-anchor="middle">V<tspan font-size="9" baseline-shift="sub">Ref</tspan></text>
  <line x1="100" y1="148" x2="100" y2="129" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="100,126 96,134 104,134" fill="#1e293b"/>
  <rect x="93" y="148" width="14" height="38" fill="none" stroke="#1e293b" stroke-width="1.5"/>
  <text x="78" y="170" font-size="12" font-family="sans-serif" fill="#1e293b" text-anchor="middle">R3</text>
  <line x1="100" y1="186" x2="100" y2="191" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Knoten U_In- -->
  <circle cx="100" cy="191" r="2.5" fill="#1e293b"/>
  <line x1="100" y1="191" x2="150" y2="191" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <text x="110" y="206" font-size="11" font-family="sans-serif" fill="#2563eb">U<tspan font-size="8" baseline-shift="sub">In-</tspan></text>

  <line x1="100" y1="191" x2="100" y2="196" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="93" y="196" width="14" height="38" fill="none" stroke="#1e293b" stroke-width="1.5"/>
  <text x="78" y="218" font-size="12" font-family="sans-serif" fill="#1e293b" text-anchor="middle">R4</text>
  <line x1="100" y1="234" x2="100" y2="270" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="100" cy="270" r="2.5" fill="#1e293b"/>

  <!-- OPV: IEC-Symbol · + Pin (150,169) · - Pin (150,191) · OUT (226,180) -->
  <g transform="translate(150,140)">
    <line x1="0"  y1="29" x2="16" y2="29" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
    <line x1="0"  y1="51" x2="16" y2="51" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
    <line x1="60" y1="40" x2="76" y2="40" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
    <rect x="16" y="7" width="44" height="66" fill="none" stroke="#1e293b" stroke-width="2"/>
    <polygon points="23,14 23,22 31,18" fill="#1e293b"/>
    <text x="49" y="18" font-size="13" fill="#1e293b" font-family="sans-serif" text-anchor="middle" dominant-baseline="middle">∞</text>
    <text x="23" y="29" font-size="12" fill="#dc2626" font-family="sans-serif" text-anchor="start" dominant-baseline="middle">+</text>
    <text x="23" y="51" font-size="12" fill="#1e293b" font-family="sans-serif" text-anchor="start" dominant-baseline="middle">−</text>
  </g>

  <!-- VCC -->
  <line x1="188" y1="147" x2="188" y2="123" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="168" y1="123" x2="208" y2="123" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
  <text x="188" y="112" font-size="10" font-family="monospace" fill="#1e293b" text-anchor="middle">VCC</text>

  <!-- Single Supply: unterer Versorgungspin liegt direkt auf GND (statt -VCC) -->
  <line x1="188" y1="213" x2="188" y2="228" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="173" y1="228" x2="203" y2="228" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
  <text x="188" y="241" font-size="10" font-family="monospace" fill="#1e293b" text-anchor="middle">GND</text>

  <!-- Ausgang -->
  <line x1="226" y1="180" x2="250" y2="180" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="250" cy="180" r="2.5" fill="#1e293b"/>
  <line x1="250" y1="180" x2="320" y2="180" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="320" cy="180" r="3" fill="white" stroke="#1e293b" stroke-width="1.5"/>

  <!-- untere Bezugsschiene mit GND -->
  <line x1="40" y1="270" x2="320" y2="270" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="40" cy="270" r="3" fill="white" stroke="#1e293b" stroke-width="1.5"/>
  <circle cx="320" cy="270" r="3" fill="white" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="250" y1="270" x2="250" y2="278" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="235" y1="278" x2="265" y2="278" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
  <text x="250" y="291" font-size="10" font-family="monospace" fill="#1e293b" text-anchor="middle">GND</text>

  <!-- Ue / Ua Spannungspfeile (blau) -->
  <line x1="28" y1="60" x2="28" y2="266" stroke="#2563eb" stroke-width="1.5" marker-end="url(#pfeil)"/>
  <text x="14" y="168" font-size="13" font-family="sans-serif" fill="#2563eb">Ue</text>
  <line x1="340" y1="184" x2="340" y2="266" stroke="#2563eb" stroke-width="1.5" marker-end="url(#pfeil)"/>
  <text x="346" y="228" font-size="13" font-family="sans-serif" fill="#2563eb">Ua</text>

</svg>
