<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 380" width="420" height="380">

  <defs>
    <marker id="pfeil" markerWidth="8" markerHeight="8" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- U1 -> R1 -> Knoten A -> "-"-Eingang (rot) -->
  <text x="28" y="79" font-size="16" font-family="sans-serif" fill="#2563eb" text-anchor="end" font-weight="bold">U<tspan font-size="11" baseline-shift="sub">1</tspan></text>
  <circle cx="40" cy="75" r="3" fill="white" stroke="#dc2626" stroke-width="1.5"/>
  <line x1="40" y1="75" x2="60" y2="75" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="60" y="68" width="36" height="14" fill="none" stroke="#1e293b" stroke-width="1.5"/>
  <text x="78" y="59" font-size="12" font-family="sans-serif" fill="#1e293b" text-anchor="middle">R<tspan font-size="9" baseline-shift="sub">1</tspan></text>
  <line x1="96" y1="75" x2="110" y2="75" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="110" cy="75" r="2.5" fill="#dc2626"/>
  <line x1="110" y1="75" x2="110" y2="169" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="110" y1="169" x2="150" y2="169" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/>

  <!-- U1: lokale Masse -->
  <line x1="40" y1="80" x2="40" y2="104" stroke="#2563eb" stroke-width="1.5" marker-end="url(#pfeil)"/>
  <line x1="28" y1="108" x2="52" y2="108" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
  <text x="40" y="121" font-size="10" font-family="monospace" fill="#1e293b" text-anchor="middle">GND</text>

  <!-- R2: Rueckkopplung Knoten A -> Ausgang (schwarz, gleiche Hoehe wie R1) -->
  <line x1="110" y1="75" x2="130" y2="75" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="130" y="68" width="40" height="14" fill="none" stroke="#1e293b" stroke-width="1.5"/>
  <text x="150" y="59" font-size="12" font-family="sans-serif" fill="#1e293b" text-anchor="middle">R<tspan font-size="9" baseline-shift="sub">2</tspan></text>
  <line x1="170" y1="75" x2="250" y2="75" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="250" y1="75" x2="250" y2="180" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- OPV: IEC-Symbol · "-" oben (150,169) · "+" unten (150,191) · OUT (226,180) -->
  <g transform="translate(150,140)">
    <line x1="0"  y1="29" x2="16" y2="29" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
    <line x1="0"  y1="51" x2="16" y2="51" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
    <line x1="60" y1="40" x2="76" y2="40" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
    <rect x="16" y="7" width="44" height="66" fill="none" stroke="#1e293b" stroke-width="2"/>
    <polygon points="23,14 23,22 31,18" fill="#1e293b"/>
    <text x="49" y="18" font-size="13" fill="#1e293b" font-family="sans-serif" text-anchor="middle" dominant-baseline="middle">∞</text>
    <text x="23" y="29" font-size="12" fill="#dc2626" font-family="sans-serif" text-anchor="start" dominant-baseline="middle">−</text>
    <text x="23" y="51" font-size="12" fill="#dc2626" font-family="sans-serif" text-anchor="start" dominant-baseline="middle">+</text>
  </g>

  <!-- U2 -> R3 -> Knoten B -> R4 -> GND: kollinear in einer Linie (Spannungsteiler fuer "+") -->
  <text x="28" y="299" font-size="16" font-family="sans-serif" fill="#2563eb" text-anchor="end" font-weight="bold">U<tspan font-size="11" baseline-shift="sub">2</tspan></text>
  <circle cx="40" cy="295" r="3" fill="white" stroke="#dc2626" stroke-width="1.5"/>
  <line x1="40" y1="295" x2="60" y2="295" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="60" y="288" width="36" height="14" fill="none" stroke="#1e293b" stroke-width="1.5"/>
  <text x="78" y="279" font-size="12" font-family="sans-serif" fill="#1e293b" text-anchor="middle">R<tspan font-size="9" baseline-shift="sub">3</tspan></text>
  <line x1="96" y1="295" x2="110" y2="295" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Knoten B -> "+"-Eingang (rot, kreuzungsfrei in der Luecke zwischen den Pins) -->
  <circle cx="110" cy="295" r="2.5" fill="#dc2626"/>
  <line x1="110" y1="295" x2="110" y2="191" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="110" y1="191" x2="150" y2="191" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/>

  <!-- R4: Knoten B -> GND, kollinear mit R3 (schwarz, Spannungsteiler) -->
  <line x1="110" y1="295" x2="130" y2="295" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="130" y="288" width="36" height="14" fill="none" stroke="#1e293b" stroke-width="1.5"/>
  <text x="148" y="279" font-size="12" font-family="sans-serif" fill="#1e293b" text-anchor="middle">R<tspan font-size="9" baseline-shift="sub">4</tspan></text>
  <line x1="166" y1="295" x2="186" y2="295" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="186" y1="295" x2="186" y2="315" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="171" y1="315" x2="201" y2="315" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
  <text x="186" y="328" font-size="10" font-family="monospace" fill="#1e293b" text-anchor="middle">GND</text>

  <!-- U2: lokale Masse -->
  <line x1="40" y1="300" x2="40" y2="324" stroke="#2563eb" stroke-width="1.5" marker-end="url(#pfeil)"/>
  <line x1="28" y1="328" x2="52" y2="328" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
  <text x="40" y="341" font-size="10" font-family="monospace" fill="#1e293b" text-anchor="middle">GND</text>

  <!-- Ausgang -->
  <line x1="226" y1="180" x2="250" y2="180" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="250" cy="180" r="2.5" fill="#1e293b"/>
  <line x1="250" y1="180" x2="320" y2="180" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="320" cy="180" r="3" fill="white" stroke="#1e293b" stroke-width="1.5"/>

  <!-- Ua: Spannungspfeil und lokale Masse -->
  <line x1="340" y1="184" x2="340" y2="338" stroke="#2563eb" stroke-width="1.5" marker-end="url(#pfeil)"/>
  <text x="346" y="264" font-size="13" font-family="sans-serif" fill="#2563eb">Ua</text>
  <line x1="328" y1="342" x2="352" y2="342" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
  <text x="340" y="355" font-size="10" font-family="monospace" fill="#1e293b" text-anchor="middle">GND</text>

</svg>
