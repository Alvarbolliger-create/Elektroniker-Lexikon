<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 340" width="500" height="340">

  <defs>
    <marker id="pfeil" markerWidth="8" markerHeight="8" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- ===== OPV1 (oben): "+" oben (U1), "-" unten -> Knoten A ===== -->
  <text x="28" y="73" font-size="16" font-family="sans-serif" fill="#2563eb" text-anchor="end" font-weight="bold">U<tspan font-size="11" baseline-shift="sub">1</tspan></text>
  <circle cx="40" cy="69" r="3" fill="white" stroke="#dc2626" stroke-width="1.5"/>
  <line x1="40" y1="69" x2="70" y2="69" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/>

  <g transform="translate(70,40)">
    <line x1="0"  y1="29" x2="16" y2="29" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
    <line x1="0"  y1="51" x2="16" y2="51" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
    <line x1="60" y1="40" x2="76" y2="40" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
    <rect x="16" y="7" width="44" height="66" fill="none" stroke="#1e293b" stroke-width="2"/>
    <polygon points="23,14 23,22 31,18" fill="#1e293b"/>
    <text x="49" y="18" font-size="13" fill="#1e293b" font-family="sans-serif" text-anchor="middle" dominant-baseline="middle">∞</text>
    <text x="23" y="29" font-size="12" fill="#dc2626" font-family="sans-serif" text-anchor="start" dominant-baseline="middle">+</text>
    <text x="23" y="51" font-size="12" fill="#1e293b" font-family="sans-serif" text-anchor="start" dominant-baseline="middle">−</text>
  </g>

  <!-- ===== OPV2 (unten): gespiegelt zu OPV1 - "-" oben -> Knoten B, "+" unten (U2) ===== -->
  <text x="28" y="285" font-size="16" font-family="sans-serif" fill="#2563eb" text-anchor="end" font-weight="bold">U<tspan font-size="11" baseline-shift="sub">2</tspan></text>
  <circle cx="40" cy="281" r="3" fill="white" stroke="#dc2626" stroke-width="1.5"/>
  <line x1="40" y1="281" x2="70" y2="281" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/>

  <g transform="translate(70,230)">
    <line x1="0"  y1="29" x2="16" y2="29" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
    <line x1="0"  y1="51" x2="16" y2="51" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
    <line x1="60" y1="40" x2="76" y2="40" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
    <rect x="16" y="7" width="44" height="66" fill="none" stroke="#1e293b" stroke-width="2"/>
    <polygon points="23,14 23,22 31,18" fill="#1e293b"/>
    <text x="49" y="18" font-size="13" fill="#1e293b" font-family="sans-serif" text-anchor="middle" dominant-baseline="middle">∞</text>
    <text x="23" y="29" font-size="12" fill="#1e293b" font-family="sans-serif" text-anchor="start" dominant-baseline="middle">−</text>
    <text x="23" y="51" font-size="12" fill="#dc2626" font-family="sans-serif" text-anchor="start" dominant-baseline="middle">+</text>
  </g>

  <!-- ===== Verstaerkungsnetzwerk: Knoten A - Rgain - Knoten B (eine Verbindung), je R als Rueckkopplung zum eigenen Ausgang ===== -->
  <!-- Knoten A ("-" OPV1) -> Verzweigung -->
  <line x1="70" y1="91" x2="70" y2="128" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="70" cy="128" r="2.5" fill="#1e293b"/>
  <line x1="70" y1="128" x2="70" y2="160" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Rgain: einzige Verbindung zwischen Knoten A und Knoten B -->
  <rect x="63" y="160" width="14" height="30" fill="none" stroke="#1e293b" stroke-width="1.5"/>
  <text x="82" y="179" font-size="12" font-family="sans-serif" fill="#1e293b" text-anchor="start">R<tspan font-size="9" baseline-shift="sub">gain</tspan></text>

  <!-- Knoten B ("-" OPV2) -> Verzweigung -->
  <line x1="70" y1="190" x2="70" y2="225" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="70" cy="225" r="2.5" fill="#1e293b"/>
  <line x1="70" y1="225" x2="70" y2="259" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- R: Rueckkopplung Knoten A -> OPV1-Ausgang (unter dem Gehaeuse herumgefuehrt, kreuzungsfrei) -->
  <line x1="70" y1="128" x2="90" y2="128" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="90" y="121" width="36" height="14" fill="none" stroke="#1e293b" stroke-width="1.5"/>
  <text x="108" y="150" font-size="12" font-family="sans-serif" fill="#1e293b" text-anchor="middle">R</text>
  <line x1="126" y1="128" x2="146" y2="128" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="146" y1="128" x2="146" y2="80" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- R: Rueckkopplung Knoten B -> OPV2-Ausgang (ueber dem Gehaeuse herumgefuehrt, kreuzungsfrei, gespiegelt) -->
  <line x1="70" y1="225" x2="90" y2="225" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="90" y="218" width="36" height="14" fill="none" stroke="#1e293b" stroke-width="1.5"/>
  <text x="108" y="209" font-size="12" font-family="sans-serif" fill="#1e293b" text-anchor="middle">R</text>
  <line x1="126" y1="225" x2="146" y2="225" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="146" y1="225" x2="146" y2="270" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- ===== Stufe 1 oben: OPV1-Ausgang -> R1 -> Knoten 1 -> R2 -> Rueckkopplung OPV3 ===== -->
  <circle cx="146" cy="80" r="2.5" fill="#1e293b"/>
  <line x1="146" y1="80" x2="170" y2="80" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="170" y="73" width="36" height="14" fill="none" stroke="#1e293b" stroke-width="1.5"/>
  <text x="188" y="64" font-size="12" font-family="sans-serif" fill="#1e293b" text-anchor="middle">R<tspan font-size="9" baseline-shift="sub">1</tspan></text>
  <line x1="206" y1="80" x2="230" y2="80" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="230" cy="80" r="2.5" fill="#1e293b"/>

  <!-- Knoten 1 -> "-"-Eingang OPV3 (kreuzungsfrei nach unten) -->
  <line x1="230" y1="80" x2="230" y2="169" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="230" y1="169" x2="270" y2="169" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Knoten 1 -> R2 -> Rueckkopplung von OPV3-Ausgang -->
  <line x1="230" y1="80" x2="250" y2="80" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="250" y="73" width="36" height="14" fill="none" stroke="#1e293b" stroke-width="1.5"/>
  <text x="268" y="64" font-size="12" font-family="sans-serif" fill="#1e293b" text-anchor="middle">R<tspan font-size="9" baseline-shift="sub">2</tspan></text>
  <line x1="286" y1="80" x2="370" y2="80" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="370" y1="80" x2="370" y2="180" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- ===== Stufe 1 unten: OPV2-Ausgang -> R1 -> Knoten 2 -> R2 -> GND ===== -->
  <circle cx="146" cy="270" r="2.5" fill="#1e293b"/>
  <line x1="146" y1="270" x2="170" y2="270" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="170" y="263" width="36" height="14" fill="none" stroke="#1e293b" stroke-width="1.5"/>
  <text x="188" y="254" font-size="12" font-family="sans-serif" fill="#1e293b" text-anchor="middle">R<tspan font-size="9" baseline-shift="sub">1</tspan></text>
  <line x1="206" y1="270" x2="230" y2="270" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="230" cy="270" r="2.5" fill="#1e293b"/>

  <!-- Knoten 2 -> "+"-Eingang OPV3 (kreuzungsfrei nach oben) -->
  <line x1="230" y1="270" x2="230" y2="191" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="230" y1="191" x2="270" y2="191" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Knoten 2 -> R2 -> GND (Spannungsteiler) -->
  <line x1="230" y1="270" x2="250" y2="270" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="250" y="263" width="36" height="14" fill="none" stroke="#1e293b" stroke-width="1.5"/>
  <text x="268" y="254" font-size="12" font-family="sans-serif" fill="#1e293b" text-anchor="middle">R<tspan font-size="9" baseline-shift="sub">2</tspan></text>
  <line x1="286" y1="270" x2="310" y2="270" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="310" y1="270" x2="310" y2="290" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="295" y1="290" x2="325" y2="290" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
  <text x="310" y="303" font-size="10" font-family="monospace" fill="#1e293b" text-anchor="middle">GND</text>

  <!-- ===== Stufe 2: Differenzverstaerker (OPV3) · "-" oben (270,169) · "+" unten (270,191) · OUT (346,180) ===== -->
  <g transform="translate(270,140)">
    <line x1="0"  y1="29" x2="16" y2="29" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
    <line x1="0"  y1="51" x2="16" y2="51" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
    <line x1="60" y1="40" x2="76" y2="40" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
    <rect x="16" y="7" width="44" height="66" fill="none" stroke="#1e293b" stroke-width="2"/>
    <polygon points="23,14 23,22 31,18" fill="#1e293b"/>
    <text x="49" y="18" font-size="13" fill="#1e293b" font-family="sans-serif" text-anchor="middle" dominant-baseline="middle">∞</text>
    <text x="23" y="29" font-size="12" fill="#1e293b" font-family="sans-serif" text-anchor="start" dominant-baseline="middle">−</text>
    <text x="23" y="51" font-size="12" fill="#1e293b" font-family="sans-serif" text-anchor="start" dominant-baseline="middle">+</text>
  </g>

  <!-- Ausgang OPV3 -> Knotenpunkt -> Ua / Rueckkopplung -->
  <line x1="346" y1="180" x2="370" y2="180" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="370" cy="180" r="2.5" fill="#1e293b"/>
  <line x1="370" y1="180" x2="430" y2="180" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="430" cy="180" r="3" fill="white" stroke="#1e293b" stroke-width="1.5"/>

  <!-- Ua Spannungspfeil (blau) -->
  <line x1="450" y1="184" x2="450" y2="250" stroke="#2563eb" stroke-width="1.5" marker-end="url(#pfeil)"/>
  <text x="456" y="220" font-size="13" font-family="sans-serif" fill="#2563eb">Ua</text>

</svg>
