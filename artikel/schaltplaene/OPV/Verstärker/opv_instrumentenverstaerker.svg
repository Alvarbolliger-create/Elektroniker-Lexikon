<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 340" width="480" height="340">

  <defs>
    <marker id="pfeil" markerWidth="8" markerHeight="8" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- ===== Stufe 1: Puffer fuer U1 (oben) ===== -->
  <text x="8" y="73" font-size="16" font-family="sans-serif" fill="#2563eb" text-anchor="end" font-weight="bold">U<tspan font-size="11" baseline-shift="sub">1</tspan></text>
  <circle cx="20" cy="69" r="3" fill="white" stroke="#dc2626" stroke-width="1.5"/>
  <line x1="20" y1="69" x2="60" y2="69" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/>

  <g transform="translate(60,40)">
    <line x1="0"  y1="29" x2="16" y2="29" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
    <line x1="0"  y1="51" x2="16" y2="51" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
    <line x1="60" y1="40" x2="76" y2="40" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
    <rect x="16" y="7" width="44" height="66" fill="none" stroke="#1e293b" stroke-width="2"/>
    <polygon points="23,14 23,22 31,18" fill="#1e293b"/>
    <text x="49" y="18" font-size="13" fill="#1e293b" font-family="sans-serif" text-anchor="middle" dominant-baseline="middle">∞</text>
    <text x="23" y="29" font-size="12" fill="#dc2626" font-family="sans-serif" text-anchor="start" dominant-baseline="middle">+</text>
    <text x="23" y="51" font-size="12" fill="#1e293b" font-family="sans-serif" text-anchor="start" dominant-baseline="middle">−</text>
  </g>

  <!-- Rueckkopplung OPV1: Ausgang -> "-" (Schleife unter dem OPV, kreuzungsfrei) -->
  <circle cx="136" cy="80" r="2.5" fill="#1e293b"/>
  <line x1="136" y1="80" x2="136" y2="120" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="136" y1="120" x2="40" y2="120" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="120" x2="40" y2="91" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="91" x2="60" y2="91" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- OPV1 Ausgang -> R1 -> Knoten 1 -->
  <line x1="136" y1="80" x2="160" y2="80" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="160" y="73" width="36" height="14" fill="none" stroke="#1e293b" stroke-width="1.5"/>
  <text x="178" y="64" font-size="12" font-family="sans-serif" fill="#1e293b" text-anchor="middle">R<tspan font-size="9" baseline-shift="sub">1</tspan></text>
  <line x1="196" y1="80" x2="220" y2="80" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="220" cy="80" r="2.5" fill="#1e293b"/>

  <!-- Knoten 1 -> "-"-Eingang von OPV3 (kreuzungsfrei nach unten) -->
  <line x1="220" y1="80" x2="220" y2="169" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="220" y1="169" x2="260" y2="169" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Knoten 1 -> R2 -> Rueckkopplung von OPV3-Ausgang -->
  <line x1="220" y1="80" x2="240" y2="80" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="240" y="73" width="36" height="14" fill="none" stroke="#1e293b" stroke-width="1.5"/>
  <text x="258" y="64" font-size="12" font-family="sans-serif" fill="#1e293b" text-anchor="middle">R<tspan font-size="9" baseline-shift="sub">2</tspan></text>
  <line x1="276" y1="80" x2="360" y2="80" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="360" y1="80" x2="360" y2="180" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- ===== Stufe 1: Puffer fuer U2 (unten, gespiegelt) ===== -->
  <text x="8" y="263" font-size="16" font-family="sans-serif" fill="#2563eb" text-anchor="end" font-weight="bold">U<tspan font-size="11" baseline-shift="sub">2</tspan></text>
  <circle cx="20" cy="259" r="3" fill="white" stroke="#dc2626" stroke-width="1.5"/>
  <line x1="20" y1="259" x2="60" y2="259" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/>

  <g transform="translate(60,230)">
    <line x1="0"  y1="29" x2="16" y2="29" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
    <line x1="0"  y1="51" x2="16" y2="51" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
    <line x1="60" y1="40" x2="76" y2="40" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
    <rect x="16" y="7" width="44" height="66" fill="none" stroke="#1e293b" stroke-width="2"/>
    <polygon points="23,14 23,22 31,18" fill="#1e293b"/>
    <text x="49" y="18" font-size="13" fill="#1e293b" font-family="sans-serif" text-anchor="middle" dominant-baseline="middle">∞</text>
    <text x="23" y="29" font-size="12" fill="#dc2626" font-family="sans-serif" text-anchor="start" dominant-baseline="middle">+</text>
    <text x="23" y="51" font-size="12" fill="#1e293b" font-family="sans-serif" text-anchor="start" dominant-baseline="middle">−</text>
  </g>

  <!-- Rueckkopplung OPV2: Ausgang -> "-" (Schleife unter dem OPV, kreuzungsfrei) -->
  <circle cx="136" cy="270" r="2.5" fill="#1e293b"/>
  <line x1="136" y1="270" x2="136" y2="310" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="136" y1="310" x2="40" y2="310" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="310" x2="40" y2="281" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="281" x2="60" y2="281" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- OPV2 Ausgang -> R1 -> Knoten 2 -->
  <line x1="136" y1="270" x2="160" y2="270" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="160" y="263" width="36" height="14" fill="none" stroke="#1e293b" stroke-width="1.5"/>
  <text x="178" y="254" font-size="12" font-family="sans-serif" fill="#1e293b" text-anchor="middle">R<tspan font-size="9" baseline-shift="sub">1</tspan></text>
  <line x1="196" y1="270" x2="220" y2="270" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="220" cy="270" r="2.5" fill="#1e293b"/>

  <!-- Knoten 2 -> "+"-Eingang von OPV3 (kreuzungsfrei nach oben) -->
  <line x1="220" y1="270" x2="220" y2="191" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="220" y1="191" x2="260" y2="191" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Knoten 2 -> R2 -> GND (Spannungsteiler) -->
  <line x1="220" y1="270" x2="240" y2="270" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="240" y="263" width="36" height="14" fill="none" stroke="#1e293b" stroke-width="1.5"/>
  <text x="258" y="254" font-size="12" font-family="sans-serif" fill="#1e293b" text-anchor="middle">R<tspan font-size="9" baseline-shift="sub">2</tspan></text>
  <line x1="276" y1="270" x2="300" y2="270" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="300" y1="270" x2="300" y2="290" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="285" y1="290" x2="315" y2="290" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
  <text x="300" y="303" font-size="10" font-family="monospace" fill="#1e293b" text-anchor="middle">GND</text>

  <!-- ===== Stufe 2: Differenzverstaerker (OPV3, rechts) ===== -->
  <!-- "-" oben (260,169) · "+" unten (260,191) · OUT (336,180) -->
  <g transform="translate(260,140)">
    <line x1="0"  y1="29" x2="16" y2="29" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
    <line x1="0"  y1="51" x2="16" y2="51" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
    <line x1="60" y1="40" x2="76" y2="40" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
    <rect x="16" y="7" width="44" height="66" fill="none" stroke="#1e293b" stroke-width="2"/>
    <polygon points="23,14 23,22 31,18" fill="#1e293b"/>
    <text x="49" y="18" font-size="13" fill="#1e293b" font-family="sans-serif" text-anchor="middle" dominant-baseline="middle">∞</text>
    <text x="23" y="29" font-size="12" fill="#1e293b" font-family="sans-serif" text-anchor="start" dominant-baseline="middle">−</text>
    <text x="23" y="51" font-size="12" fill="#1e293b" font-family="sans-serif" text-anchor="start" dominant-baseline="middle">+</text>
  </g>

  <!-- Ausgang OPV3 -> Knotenpunkt -> Ua / Rueckkopplung -->
  <line x1="336" y1="180" x2="360" y2="180" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="360" cy="180" r="2.5" fill="#1e293b"/>
  <line x1="360" y1="180" x2="420" y2="180" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="420" cy="180" r="3" fill="white" stroke="#1e293b" stroke-width="1.5"/>

  <!-- Ua Spannungspfeil (blau) -->
  <line x1="440" y1="184" x2="440" y2="250" stroke="#2563eb" stroke-width="1.5" marker-end="url(#pfeil)"/>
  <text x="446" y="220" font-size="13" font-family="sans-serif" fill="#2563eb">Ua</text>

</svg>
