<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 410 415" width="410" height="415">

  <!-- ==========================================
       VOLTAGE DIVIDER (x=100)
       R_oben → U_S_oben → R_F → U_S_unten → R_unten
       ========================================== -->

  <!-- VCC -->
  <text x="100" y="11" text-anchor="middle" font-family="monospace" font-size="13" fill="#1e293b">V_cc</text>
  <line x1="70"  y1="16" x2="130" y2="16"  stroke="#1e293b" stroke-width="4"   stroke-linecap="round"/>
  <line x1="100" y1="16" x2="100" y2="55"  stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- R_oben (body y=65..105) -->
  <rect x="93" y="65" width="14" height="40" fill="none" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="100" y1="55"  x2="100" y2="65"  stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="100" y1="105" x2="100" y2="140" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <text x="120" y="83"  font-size="11" font-family="sans-serif" fill="#1e293b" text-anchor="start">R_oben</text>
  <text x="120" y="97"  font-size="10" font-family="sans-serif" fill="#6b7280" text-anchor="start">10 kΩ</text>

  <!-- U_S_oben node (y=140) -->
  <circle cx="100" cy="140" r="2.5" fill="#1e293b"/>
  <text x="105" y="133" font-size="10" font-family="sans-serif" fill="#1e293b" text-anchor="start">U_S_oben</text>

  <!-- R_F (body y=185..225) — highlighted in red as the key component -->
  <line x1="100" y1="140" x2="100" y2="185" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="93" y="185" width="14" height="40" fill="none" stroke="#dc2626" stroke-width="2"/>
  <line x1="100" y1="225" x2="100" y2="265" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <text x="120" y="203" font-size="11" font-family="sans-serif" fill="#dc2626" font-weight="bold" text-anchor="start">R_F</text>
  <text x="120" y="217" font-size="10" font-family="sans-serif" fill="#6b7280" text-anchor="start">2.2 kΩ</text>

  <!-- U_S_unten node (y=265) -->
  <circle cx="100" cy="265" r="2.5" fill="#1e293b"/>
  <text x="105" y="258" font-size="10" font-family="sans-serif" fill="#1e293b" text-anchor="start">U_S_unten</text>

  <!-- R_unten (body y=315..355) -->
  <line x1="100" y1="265" x2="100" y2="315" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="93" y="315" width="14" height="40" fill="none" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="100" y1="355" x2="100" y2="375" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <text x="120" y="333" font-size="11" font-family="sans-serif" fill="#1e293b" text-anchor="start">R_unten</text>
  <text x="120" y="347" font-size="10" font-family="sans-serif" fill="#6b7280" text-anchor="start">10 kΩ</text>

  <!-- GND -->
  <line x1="70"  y1="375" x2="130" y2="375" stroke="#1e293b" stroke-width="4"   stroke-linecap="round"/>
  <text x="100"  y="393"  text-anchor="middle" font-family="monospace" font-size="13" fill="#1e293b">GND</text>

  <!-- ==========================================
       HORIZONTAL WIRES (divider → comparator (+) pins)
       ========================================== -->

  <!-- U_S_oben (100,140) → IC1A (+) (210,140) -->
  <line x1="100" y1="140" x2="210" y2="140" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- U_S_unten (100,265) → IC1B (+) (210,265) — hop over U_in bus at x=175 -->
  <line x1="100" y1="265" x2="170" y2="265" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 170,265 A 5,5 0 0 0 180,265" fill="none" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="180" y1="265" x2="210" y2="265" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- ==========================================
       COMPARATOR IC1A
       translate(210,111): (+)=(210,140) (−)=(210,162) OUT=(286,151)
       ========================================== -->
  <text x="248" y="113" font-size="10" font-family="sans-serif" fill="#1e293b" text-anchor="middle">IC1A</text>
  <g transform="translate(210,111)">
    <line x1="0"  y1="29" x2="16" y2="29" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
    <line x1="0"  y1="51" x2="16" y2="51" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
    <line x1="60" y1="40" x2="76" y2="40" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
    <rect x="16" y="7" width="44" height="66" fill="white" stroke="#1e293b" stroke-width="2"/>
    <text x="23" y="29" font-size="12" fill="#1e293b" font-family="sans-serif" text-anchor="start" dominant-baseline="middle">+</text>
    <text x="23" y="51" font-size="12" fill="#1e293b" font-family="sans-serif" text-anchor="start" dominant-baseline="middle">−</text>
  </g>
  <!-- IC1A output -->
  <line x1="286" y1="151" x2="345" y2="151" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="345" cy="151" r="3" fill="white" stroke="#1e293b" stroke-width="1.5"/>
  <text x="352" y="155" font-size="11" font-family="sans-serif" fill="#1e293b" text-anchor="start">Q_A</text>

  <!-- ==========================================
       COMPARATOR IC1B
       translate(210,236): (+)=(210,265) (−)=(210,287) OUT=(286,276)
       ========================================== -->
  <text x="248" y="238" font-size="10" font-family="sans-serif" fill="#1e293b" text-anchor="middle">IC1B</text>
  <g transform="translate(210,236)">
    <line x1="0"  y1="29" x2="16" y2="29" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
    <line x1="0"  y1="51" x2="16" y2="51" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
    <line x1="60" y1="40" x2="76" y2="40" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
    <rect x="16" y="7" width="44" height="66" fill="white" stroke="#1e293b" stroke-width="2"/>
    <text x="23" y="29" font-size="12" fill="#1e293b" font-family="sans-serif" text-anchor="start" dominant-baseline="middle">+</text>
    <text x="23" y="51" font-size="12" fill="#1e293b" font-family="sans-serif" text-anchor="start" dominant-baseline="middle">−</text>
  </g>
  <!-- IC1B output -->
  <line x1="286" y1="276" x2="345" y2="276" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="345" cy="276" r="3" fill="white" stroke="#1e293b" stroke-width="1.5"/>
  <text x="352" y="280" font-size="11" font-family="sans-serif" fill="#1e293b" text-anchor="start">Q_B</text>

  <!-- ==========================================
       U_in BUS (x=175, y=162..287)
       IC1A (−) at (210,162), IC1B (−) at (210,287)
       Entry at (140,224)
       ========================================== -->

  <!-- Vertical bus -->
  <line x1="175" y1="162" x2="175" y2="287" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <!-- IC1A (−) horizontal stub -->
  <line x1="175" y1="162" x2="210" y2="162" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <!-- IC1B (−) horizontal stub -->
  <line x1="175" y1="287" x2="210" y2="287" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <!-- U_in entry wire from left -->
  <line x1="140" y1="224" x2="175" y2="224" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Junction dot on bus -->
  <circle cx="175" cy="224" r="2.5" fill="#1e293b"/>
  <!-- U_in input terminal -->
  <circle cx="140" cy="224" r="3" fill="white" stroke="#1e293b" stroke-width="1.5"/>
  <!-- U_in label -->
  <text x="133" y="221" font-size="11" font-family="sans-serif" fill="#1e293b" text-anchor="end">U_in</text>

</svg>
