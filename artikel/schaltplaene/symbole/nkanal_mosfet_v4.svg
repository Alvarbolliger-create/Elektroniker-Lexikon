<svg viewBox="0 0 210 210" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>N-Kanal MOSFET Schaltplan-Symbol</title>
  <desc>N-Kanal MOSFET Schaltzeichen mit Gate, Drain und Source</desc>

  <!--
    U = 60px

    === GATE (umgekehrtes L) ===
    Gate-Horizontal: x=30→90, y=100   (1U=60px)
    Gate-Vertikal:   x=90, y=40→100   (1U=60px, nach oben)
    Mitte Gate-Vertikal: y=70
    Gate-Anschluss: (30, 100)

    === ABSTAND PARALLELEN ===
    0.3U = 18px → Oxidstriche bei x=90+18=108

    === DREI OXIDSTRICHE ===
    Länge je:    0.25U = 15px
    Abstand je:  0.15U = 9px
    Gesamt:      3*15 + 2*9 = 45+18 = 63px = 1.05U ✓

    Zentriert auf Mitte Gate-Vertikal (y=70):
    Block-Start = 70 - 63/2 = 70 - 31.5 = 38.5

    Strich 1: y=38.5  → y=53.5    Mitte y=46
    Lücke:    y=53.5  → y=62.5
    Strich 2: y=62.5  → y=77.5    Mitte y=70
    Lücke:    y=77.5  → y=86.5
    Strich 3: y=86.5  → y=101.5   Mitte y=94

    Gate-Vertikal: y=40..100 = 60px
    Oxidblock:     y=38.5..101.5 = 63px
    → Oxidblock ragt 1.5px oben und unten über Gate hinaus ✓

    === MITTELSENKRECHTEN (0.5U=30px nach rechts) ===
    Von x=108 nach x=138
    Querstrich 1: y=46
    Querstrich 2: y=70  ← Pfeil nach links
    Querstrich 3: y=94

    === VERBINDUNG UNTERE ZWEI ===
    x=138, y=70→94

    === DRAIN (oben, 0.5U=30px nach oben) ===
    Von (138, 46) → (138, 16)
    Drain-Anschluss: (138, 20) → nehme y=20 (auf Raster)
    Exakt: 46-30=16 → (138, 16)

    === SOURCE (unten, 0.825U=49.5px nach unten) ===
    Von (138, 94) → (138, 94+49.5) = (138, 143.5) → y=140 (Raster)
    Nehme exakt: y=143.5 → runde auf y=140

    === PFEIL QUERSTRICH 2 (Spitze bei x=108, y=70, zeigt links) ===
    Flügellänge = 7px, ±45°
    Flügel A: (108+7*cos45, 70-7*sin45) = (108+4.95, 70-4.95) = (112.95, 65.05)
    Flügel B: (112.95, 74.95)
  -->

  <!-- Gate: umgekehrtes L -->
  <line x1="30" y1="100" x2="90" y2="100" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round" mask="url(#imagine-text-gaps-3olxoq)"/>
  <line x1="90" y1="40" x2="90" y2="100" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- 3 Oxidstriche bei x=108 -->
  <line x1="108" y1="38.5" x2="108" y2="53.5" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="108" y1="62.5" x2="108" y2="77.5" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="108" y1="86.5" x2="108" y2="101.5" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Mittelsenkrechten (x=108→138) -->
  <line x1="108" y1="46" x2="138" y2="46" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="108" y1="70" x2="138" y2="70" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="108" y1="94" x2="138" y2="94" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Verbindung untere zwei Querstriche -->
  <line x1="138" y1="70" x2="138" y2="94" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Drain: vertikal nach oben -->
  <line x1="138" y1="46" x2="138" y2="16" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Source: vertikal nach unten -->
  <line x1="138" y1="94" x2="138" y2="144" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Pfeil Querstrich 2, Spitze (108,70) zeigt links -->
  <line x1="108" y1="70" x2="112.95" y2="65.05" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="108" y1="70" x2="112.95" y2="74.95" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Anschlusspunkte -->

  <!-- Labels -->
  <text x="22" y="103" text-anchor="middle" font-family="var(--font-sans)" font-size="9" fill="var(--color-text-secondary)">G</text>
  <text x="146" y="19" text-anchor="start" font-family="var(--font-sans)" font-size="9" fill="var(--color-text-secondary)">D</text>
  <text x="146" y="147" text-anchor="start" font-family="var(--font-sans)" font-size="9" fill="var(--color-text-secondary)">S</text>
</svg>