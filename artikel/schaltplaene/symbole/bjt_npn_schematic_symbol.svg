<svg viewBox="0 0 210 210" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>BJT NPN Schaltplan-Symbol</title>
  <desc>NPN Bipolartransistor Schaltzeichen mit Basis, Kollektor und Emitter</desc>

  <!-- Hintergrund -->

  <!--
    Masseinheiten:
    Horizontale Linie (Basis-Linie): 50px lang
    Basis-Anschluss: x=40, y=100
    Basis-Linie endet bei x=90, y=100

    Vertikale Linie (Base-Strich): x=90, von y=60 bis y=140
    → Mittelsenkrechte trifft bei y=100 ✓

    5/6 der Vertikalen = y=60 + 5/6*80 = y=126.67 → Emitter-Abgang
    1/6 der Vertikalen = y=60 + 1/6*80 = y=73.33  → Kollektor-Abgang

    Länge der Schräglinien = 0.5 * 50 = 25px (horizontal = X-Anteil)
    Bei 30°: dy = 25 * tan(30°) = 25 * 0.5774 = 14.43px

    Kollektor (oben, -30° = 30° aufwärts):
      Start: x=90, y=73.33
      Ende:  x=90+25=115, y=73.33-14.43=58.90 → runden auf y=60

    Emitter (unten, +30° = 30° abwärts):
      Start: x=90, y=126.67
      Ende:  x=115, y=126.67+14.43=141.10 → runden auf y=140

    Vertikale Endlinien (≈0.8 * 50 = 40px):
    Kollektor: von x=115, y=60 nach x=115, y=20  (40px aufwärts)
    Emitter:   von x=115, y=140 nach x=115, y=180 (40px abwärts)

    Pfeilspitze am Emitter (Ende des +30°-Linie bei x=115, y=140):
    Richtungsvektor der Emitterlinie: (25, 14.43) → normiert: len=28.83
      nx = 25/28.83 = 0.8668
      ny = 14.43/28.83 = 0.5004
    Flügellänge = 0.2 * 50 = 10px
    45° Rotierung des normierten Vektors:
      cos45=0.7071, sin45=0.7071
      Flügel A (+45°): dx = (nx*cos45 - ny*sin45)*10 = (0.8668*0.7071 - 0.5004*0.7071)*10 = (0.6129-0.3539)*10 = 2.59; dy = (nx*sin45 + ny*cos45)*10 = (0.6129+0.3539)*10 = 9.67
      Flügel B (-45°): dx = (nx*cos45 + ny*sin45)*10 = (0.6129+0.3539)*10 = 9.67; dy = (-nx*sin45 + ny*cos45)*10 = (-0.6129+0.3539)*10 = -2.59

    Pfeilspitze Punkt: x=115, y=140
    Flügel A: x=115-2.59=112.41, y=140-9.67=130.33
    Flügel B: x=115-9.67=105.33, y=140+2.59=142.59
  -->

  <!-- Basis-Anschlussleitung (horizontal) -->
  <line x1="40" y1="100" x2="90" y2="100" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round" mask="url(#imagine-text-gaps-4canei)"/>

  <!-- Vertikale Basis-Linie -->
  <line x1="90" y1="60" x2="90" y2="140" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Kollektor-Schräglinie (von 1/6-Punkt aufwärts 30°) -->
  <line x1="90" y1="73.33" x2="115" y2="60" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Emitter-Schräglinie (von 5/6-Punkt abwärts 30°) -->
  <line x1="90" y1="126.67" x2="115" y2="140" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Kollektor-Vertikale (nach oben, endet bei y=20 auf Raster) -->
  <line x1="115" y1="60" x2="115" y2="20" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Emitter-Vertikale (nach unten, endet bei y=180 auf Raster) -->
  <line x1="115" y1="140" x2="115" y2="180" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Pfeilspitze am Emitter (Emitter-Strom zeigt nach rechts-unten) -->
  <!-- Flügel A (nach links-oben von Pfeilspitze) -->
  <line x1="115" y1="140" x2="112.41" y2="130.33" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Flügel B (nach links-unten von Pfeilspitze) -->
  <line x1="115" y1="140" x2="105.33" y2="142.59" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Anschlusspunkte (rot) -->
  <!-- Basis -->
  <!-- Kollektor (oben) -->
  <!-- Emitter (unten) -->

  <!-- Labels -->
  <text x="32" y="97" text-anchor="middle" font-family="var(--font-sans)" font-size="9" fill="var(--color-text-secondary)">B</text>
  <text x="125" y="17" text-anchor="start" font-family="var(--font-sans)" font-size="9" fill="var(--color-text-secondary)">C</text>
  <text x="125" y="183" text-anchor="start" font-family="var(--font-sans)" font-size="9" fill="var(--color-text-secondary)">E</text>
</svg>