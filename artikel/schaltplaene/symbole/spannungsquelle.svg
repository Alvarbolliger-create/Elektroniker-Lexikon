<svg width="100%" viewBox="0 0 210 210" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Spannungsquelle</title>

  <!-- Draht oben: (100,20)→(100,60) -->
  <line x1="100" y1="20" x2="100" y2="60" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Kreis: cx=100, cy=100, r=40 -->
  <circle cx="100" cy="100" r="40" fill="none" stroke="#1e293b" stroke-width="1.5"/>

  <!-- Vertikaler Strich innen: (100,70)→(100,130) -->
  <line x1="100" y1="70" x2="100" y2="130" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- + Zeichen oben links im Kreis: bei (80,80) -->
  <line x1="75" y1="80" x2="85" y2="80" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="80" y1="75" x2="80" y2="85" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Draht unten: (100,140)→(100,180) -->
  <line x1="100" y1="140" x2="100" y2="180" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
</svg>