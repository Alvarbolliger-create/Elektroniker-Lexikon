<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 80" width="50" height="80">
  <!-- pins: G=(0,45)  D=(30,0)  S=(30,80)  (N-Kanal JFET) -->
  <!-- Gate direkt am Kanal (kein Oxid, kein Gate-Balken) -->
  <line x1="0"  y1="45" x2="22" y2="45" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
  <!-- N-JFET Gate-Pfeil (zeigt rein in Kanal): tip=(22,45) -->
  <polygon points="22,45 27,42.5 27,47.5" fill="#1e293b"/>
  <!-- Kanal (durchgezogen, JFET = selbstleitend ohne Gate-Oxid) -->
  <line x1="26" y1="20" x2="26" y2="60" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
  <!-- Drain: oben -->
  <line x1="26" y1="24" x2="30" y2="24" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
  <line x1="30" y1="24" x2="30" y2="0"  stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
  <!-- Source: unten -->
  <line x1="26" y1="56" x2="30" y2="56" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
  <line x1="30" y1="56" x2="30" y2="80" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
</svg>
