<svg viewBox="0 0 210 210" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>BJT PNP Schaltplan-Symbol</title>
  <desc>PNP Bipolartransistor Schaltzeichen, Pfeil an Kollektor zeigt nach unten-links</desc>

  <!--
    Kollektorlinie: (90, 73.33) → (115, 60)
    Richtungsvektor (von Basis nach Kollektor): dx=25, dy=-13.33, len=28.33
    Einheitsvektor entlang Linie (→ Kollektor):  u = (0.8824, -0.4705)
    Einheitsvektor zurück (→ Basis / Pfeilrichtung): -u = (-0.8824, +0.4705)
    Orthogonale (90° zu u, nach "unten-links-Seite"): perp = (-0.4705, -0.8824)

    Pfeilspitze: P = (90, 73.33)

    Flügel = Spitze + 10px * rot(±45°) angewendet auf (-u):
    rot(+45°) von (-0.8824, 0.4705):
      fx = -0.8824*cos45 - 0.4705*sin45 = (-0.8824-0.4705)*0.7071 = -0.9563
      fy =  -0.8824*sin45 + 0.4705*cos45 = (-0.8824+0.4705)*0.7071 = -0.2912
      → Punkt A: (90 - 9.563, 73.33 - 2.912) = (80.44, 70.42)  ← das war alt

    Gespiegelt an Orthogonale bedeutet:
    Statt ±45° von (-u), nehme ich +45° und -45° von (+u) = Richtung Kollektor.
    Die Flügel öffnen sich also in Richtung (115,60), Spitze zeigt zu (90,73.33).

    Flügel = P + 10 * rot(±45°) von u=(0.8824, -0.4705):

    rot(+45°) von u:
      fx = 0.8824*0.7071 - (-0.4705)*0.7071 = (0.8824+0.4705)*0.7071 = 0.9563
      fy = 0.8824*0.7071 + (-0.4705)*0.7071 = (0.8824-0.4705)*0.7071 = 0.2912
      → Flügel A: (90 + 9.563, 73.33 + 2.912) = (99.56, 76.24)

    rot(-45°) von u:
      fx = 0.8824*0.7071 + (-0.4705)*0.7071 = (0.8824-0.4705)*0.7071 = 0.2912
      fy = -0.8824*0.7071 + (-0.4705)*0.7071 = (-0.8824-0.4705)*0.7071 = -0.9563
      → Flügel B: (90 + 2.912, 73.33 - 9.563) = (92.91, 63.77)

    Pfeil zeigt von (99.56,76.24) und (92.91,63.77) zur Spitze (90,73.33).
    Das ergibt einen Pfeil dessen Spitze unten-links liegt ✓
  -->

  <!-- Basis-Anschlussleitung -->
  <line x1="40" y1="100" x2="90" y2="100" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round" mask="url(#imagine-text-gaps-v83bvx)"/>

  <!-- Vertikale Basis-Linie -->
  <line x1="90" y1="60" x2="90" y2="140" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Kollektor-Schräglinie -->
  <line x1="90" y1="73.33" x2="115" y2="60" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Emitter-Schräglinie -->
  <line x1="90" y1="126.67" x2="115" y2="140" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Kollektor-Vertikale -->
  <line x1="115" y1="60" x2="115" y2="20" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Emitter-Vertikale -->
  <line x1="115" y1="140" x2="115" y2="180" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Pfeilspitze: Spitze bei (90, 73.33), Flügel öffnen nach oben-rechts -->
  <!-- Flügel A -->
  <line x1="90" y1="73.33" x2="99.56" y2="76.24" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Flügel B -->
  <line x1="90" y1="73.33" x2="92.91" y2="63.77" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Anschlusspunkte -->

  <!-- Labels -->
  <text x="32" y="97" text-anchor="middle" font-family="var(--font-sans)" font-size="9" fill="var(--color-text-secondary)">B</text>
  <text x="125" y="17" text-anchor="start" font-family="var(--font-sans)" font-size="9" fill="var(--color-text-secondary)">C</text>
  <text x="125" y="183" text-anchor="start" font-family="var(--font-sans)" font-size="9" fill="var(--color-text-secondary)">E</text>
</svg>