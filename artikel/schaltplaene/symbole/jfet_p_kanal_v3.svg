<svg viewBox="0 0 210 210" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>P-Kanal JFET</title>
  <desc>P-Kanal JFET Schaltzeichen</desc>

  <!--
    Gleiche Geometrie wie N-Kanal.

    PFEIL P-Kanal:
    - Leicht nach links verschoben: Spitze bei x=112 (8px links von Treffpunkt 120)
    - Flügel zeigen Richtung V1 (vertikal) → Pfeil zeigt horizontal nach links
    - Pfeilspitze zeigt nach links = (-1,0)
    - Flügel öffnen nach rechts (Richtung V1 = vertikal):
      Flügel A: (112+4.95, 50-4.95) = (116.95, 45.05)
      Flügel B: (116.95, 54.95)

    "Flügel zeigen Richtung V1" = Flügel sind vertikal ausgerichtet
    → Pfeilspitze zeigt nach links, Flügel gehen senkrecht weg:
    Flügel A: (112+7, 50) = nein, ±45° von Pfeilrichtung links:
    rot(+45°) von (-1,0): (-cos45, -sin45) = (-0.707,-0.707) → (112-4.95, 50-4.95)=(107.05,45.05)
    rot(-45°) von (-1,0): (-cos45, +sin45) = (-0.707,+0.707) → (107.05, 54.95)

    Das wären Flügel die nach links zeigen wie beim N-Kanal nur gespiegelt.
    "Flügel zeigen Richtung V1" bedeutet die Flügel sind vertikal:
    Pfeil zeigt links, Flügel senkrecht:
    Flügel A: (112+4.95, 50-4.95) = (116.95, 45.05)
    Flügel B: (116.95, 54.95)
  -->

  <!-- H1: Gate -->
  <line x1="40" y1="50" x2="120" y2="50" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round" mask="url(#imagine-text-gaps-45c51c)"/>

  <!-- V1: Kanal -->
  <line x1="120" y1="42" x2="120" y2="122" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- H2: Drain-Querstrich -->
  <line x1="120" y1="50" x2="160" y2="50" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- H3: Source-Querstrich -->
  <line x1="120" y1="114" x2="160" y2="114" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Drain-Vertikal -->
  <line x1="160" y1="50" x2="160" y2="10" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Source-Vertikal -->
  <line x1="160" y1="114" x2="160" y2="180" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Pfeil P: Spitze (112,50) zeigt nach links, Flügel nach rechts-oben/unten -->
  <line x1="112" y1="50" x2="116.95" y2="45.05" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="112" y1="50" x2="116.95" y2="54.95" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Anschlusspunkte -->

  <!-- Labels -->
  <text x="32" y="53" text-anchor="middle" font-family="var(--font-sans)" font-size="9" fill="var(--color-text-secondary)">G</text>
  <text x="168" y="13" text-anchor="start" font-family="var(--font-sans)" font-size="9" fill="var(--color-text-secondary)">D</text>
  <text x="168" y="183" text-anchor="start" font-family="var(--font-sans)" font-size="9" fill="var(--color-text-secondary)">S</text>
</svg>