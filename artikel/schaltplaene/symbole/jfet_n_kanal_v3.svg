<svg viewBox="0 0 210 210" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>N-Kanal JFET</title>
  <desc>N-Kanal JFET Schaltzeichen</desc>

  <!--
    U = 80px, Ursprung bei px=(40,50)

    Koordinaten in Einheiten → Pixel: x_px = 40 + x*80, y_px = 50 + y*80

    H1: (0,0)→(1,0)       px: (40,50)→(120,50)
    V1: (1,-0.1)→(1,0.9)  px: (120,42)→(120,122)
    H2: (1,0)→(1.5,0)     px: (120,50)→(160,50)
    H3: (1,0.8)→(1.5,0.8) px: (120,114)→(160,114)

    Drain-Vertikal: von H2-Ende (160,50) nach oben
      0.5U=40px → (160,10)
    Source-Vertikal: von H3-Ende (160,114) nach unten
      0.825U=66px → (160,180)

    Treffpunkt H1/V1/H2: (120,50)

    PFEIL N-Kanal: Spitze (120,50), Flügel zeigen Richtung H1 (nach links)
    Pfeil zeigt nach rechts (hinein)
    Länge 7px, ±45°
    Flügel A: (120-4.95, 50-4.95) = (115.05, 45.05)
    Flügel B: (115.05, 54.95)
  -->

  <!-- H1: Gate -->
  <line x1="40" y1="50" x2="120" y2="50" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round" mask="url(#imagine-text-gaps-0pkl4b)"/>

  <!-- V1: Kanal -->
  <line x1="120" y1="42" x2="120" y2="122" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- H2: Drain-Querstrich -->
  <line x1="120" y1="50" x2="160" y2="50" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- H3: Source-Querstrich -->
  <line x1="120" y1="114" x2="160" y2="114" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Drain-Vertikal -->
  <line x1="160" y1="50" x2="160" y2="10" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Source-Vertikal -->
  <line x1="160" y1="114" x2="160" y2="180" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Pfeil N: Spitze (120,50), Flügel Richtung H1 (nach links) -->
  <line x1="120" y1="50" x2="115.05" y2="45.05" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="120" y1="50" x2="115.05" y2="54.95" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Anschlusspunkte -->

  <!-- Labels -->
  <text x="32" y="53" text-anchor="middle" font-family="var(--font-sans)" font-size="9" fill="var(--color-text-secondary)">G</text>
  <text x="168" y="13" text-anchor="start" font-family="var(--font-sans)" font-size="9" fill="var(--color-text-secondary)">D</text>
  <text x="168" y="183" text-anchor="start" font-family="var(--font-sans)" font-size="9" fill="var(--color-text-secondary)">S</text>
</svg>