<svg width="100%" viewBox="0 0 210 210" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Schalter (geschlossen)</title>

  <!-- h.1: Anschluss (20,100)→(80,100) -->
  <line x1="20" y1="100" x2="80" y2="100" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Geschlossene Linie: von (80,100) durch (132,97) bis (140,97) -->
  <line x1="80" y1="100" x2="140" y2="97" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- h.2: (132,100)→(180,100) -->
  <line x1="132" y1="100" x2="180" y2="100" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Vertikale Linie bei x=132: y=100→y=93 -->
  <line x1="132" y1="100" x2="132" y2="93" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
</svg>