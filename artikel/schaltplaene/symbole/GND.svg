<svg width="100%" viewBox="0 0 210 210" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>GND</title>

  <!-- Draht oben: (100,20)→(100,100) -->
  <line x1="100" y1="20" x2="100" y2="100" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Horizontale Linie dick: (60,100)→(140,100) -->
  <line x1="60" y1="100" x2="140" y2="100" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>

  <!-- GND Text unterhalb: y=120 -->
  <text x="100" y="120" text-anchor="middle" font-family="monospace" font-size="14" fill="#1e293b">GND</text>
</svg>