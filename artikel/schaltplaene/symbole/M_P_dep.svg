<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 57 90" width="57" height="90">
  <!-- pins: G=(0,45)  D=(42,0)  S=(42,90)  (P-Kanal Depletion MOSFET, selbstleitend) -->
  <!-- Gate -->
  <line x1="0"  y1="45" x2="18" y2="45" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
  <line x1="18" y1="22" x2="18" y2="68" stroke="#1e293b" stroke-width="3" stroke-linecap="round"/>
  <!-- Kanal (DURCHGEZOGEN = selbstleitend) at x=22 -->
  <line x1="22" y1="22" x2="22" y2="68" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
  <!-- Drain: tap → Pin D (oben) -->
  <line x1="22" y1="26" x2="42" y2="26" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
  <line x1="42" y1="26" x2="42" y2="0"  stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
  <!-- Source: tap → Pin S (unten) -->
  <line x1="22" y1="64" x2="42" y2="64" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
  <line x1="42" y1="64" x2="42" y2="90" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
  <!-- Body (Mitte): tap → verbunden mit Source -->
  <line x1="22" y1="45" x2="34" y2="45" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
  <line x1="34" y1="45" x2="34" y2="64" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
  <!-- P-Kanal Pfeil (raus): tip=(34,45) -->
  <polygon points="34,45 29,42.5 29,47.5" fill="#1e293b"/>
  <!-- Parasitäre Body-Diode (Anode=D, Kathode=S) -->
  <line x1="42" y1="26" x2="50" y2="26" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="42" y1="64" x2="50" y2="64" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="50" y1="26" x2="50" y2="38" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="50,52 47,38 53,38" fill="#1e293b"/>
  <line x1="47" y1="52" x2="53" y2="52" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="50" y1="52" x2="50" y2="64" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
</svg>
