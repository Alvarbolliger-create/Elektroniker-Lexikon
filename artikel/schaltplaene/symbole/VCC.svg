<svg width="100%" viewBox="0 0 210 210" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>VCC</title>

  <!-- VCC Text oberhalb: y=80 -->
  <text x="100" y="80" text-anchor="middle" font-family="monospace" font-size="14" fill="#1e293b">VCC</text>

  <!-- Horizontale Linie dick: (60,100)→(140,100) -->
  <line x1="60" y1="100" x2="140" y2="100" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>

  <!-- Draht unten: (100,100)→(100,180) -->
  <line x1="100" y1="100" x2="100" y2="180" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
</svg>