<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 210" width="210" height="210">
  <g transform="translate(210, 0) rotate(90)">

  <title>Widerstand (fest)</title>

  <!-- Draht links: (20,100)→(60,100) -->
  <line x1="20" y1="100" x2="60" y2="100" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Rechteck: x=60,y=80, w=80,h=40 -->
  <rect x="60" y="80" width="80" height="40" fill="none" stroke="#1e293b" stroke-width="1.5"/>
  <!-- Draht rechts: (140,100)→(180,100) -->
  <line x1="140" y1="100" x2="180" y2="100" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
