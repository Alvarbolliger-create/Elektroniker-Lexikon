<svg viewBox="0 0 210 210" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>P-Kanal MOSFET Schaltplan-Symbol</title>
  <desc>P-Kanal MOSFET Schaltzeichen mit Gate, Drain und Source</desc>

  <!--
    Identisch zu N-Kanal MOSFET, nur Pfeil gespiegelt.

    U = 60px
    Gate-Horizontal: x=30→90, y=100
    Gate-Vertikal:   x=90, y=40→100
    Oxidstriche: x=108
      Strich 1: y=38.5..53.5   Mitte y=46
      Strich 2: y=62.5..77.5   Mitte y=70
      Strich 3: y=86.5..101.5  Mitte y=94
    Mittelsenkrechten: x=108→138, bei y=46, 70, 94
    Verbindung untere zwei: x=138, y=70→94
    Drain: (138,46)→(138,16)
    Source: (138,94)→(138,144)

    === PFEIL (gespiegelt, zeigt nach rechts) ===
    N-Kanal: Spitze bei x=108 (linkes Ende Querstrich 2), Flügel nach rechts
    P-Kanal: Spitze zeigt nach rechts → Spitze ist rechts, Flügel öffnen nach links

    Querstrich 2 geht von x=108 bis x=138.
    Pfeilspitze bei x=121 (leicht rechts der Oxidstriche bei x=108, Flügel enden bei ~116 also ausserhalb)

    Flügellänge = 7px, ±45°
    Richtung zeigt nach rechts = (+1, 0)
    Flügel gehen von Spitze zurück nach links-oben und links-unten:
    Flügel A: (121 - 7*cos45, 70 - 7*sin45) = (121-4.95, 70-4.95) = (116.05, 65.05)
    Flügel B: (121 - 4.95,    70 + 4.95)    = (116.05, 74.95)

    Flügelenden bei x=116.05 → deutlich rechts von x=108 (Oxidstrich) ✓
    Spitze bei x=121, innerhalb des Querstriches (108..138) ✓
  -->

  <!-- Gate: umgekehrtes L -->
  <line x1="30" y1="100" x2="90" y2="100" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round" mask="url(#imagine-text-gaps-w53f0k)"/>
  <line x1="90" y1="40" x2="90" y2="100" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- 3 Oxidstriche bei x=108 -->
  <line x1="108" y1="38.5" x2="108" y2="53.5" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="108" y1="62.5" x2="108" y2="77.5" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="108" y1="86.5" x2="108" y2="101.5" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Mittelsenkrechten (x=108→138) -->
  <line x1="108" y1="46" x2="138" y2="46" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="108" y1="70" x2="138" y2="70" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="108" y1="94" x2="138" y2="94" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Verbindung untere zwei Querstriche -->
  <line x1="138" y1="70" x2="138" y2="94" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Drain: vertikal nach oben -->
  <line x1="138" y1="46" x2="138" y2="16" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Source: vertikal nach unten -->
  <line x1="138" y1="94" x2="138" y2="144" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Pfeil Querstrich 2, Spitze (121,70) zeigt rechts, Flügel nach links -->
  <line x1="121" y1="70" x2="116.05" y2="65.05" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="121" y1="70" x2="116.05" y2="74.95" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Anschlusspunkte -->

  <!-- Labels -->
  <text x="22" y="103" text-anchor="middle" font-family="var(--font-sans)" font-size="9" fill="var(--color-text-secondary)">G</text>
  <text x="146" y="19" text-anchor="start" font-family="var(--font-sans)" font-size="9" fill="var(--color-text-secondary)">D</text>
  <text x="146" y="147" text-anchor="start" font-family="var(--font-sans)" font-size="9" fill="var(--color-text-secondary)">S</text>
</svg>