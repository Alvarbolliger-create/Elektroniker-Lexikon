<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 220" width="480" height="220">

  <!-- U1 Anschluss links -->
  <circle cx="35" cy="70" r="3" fill="white" stroke="#1e293b" stroke-width="1.5"/>
  <circle cx="35" cy="170" r="3" fill="white" stroke="#1e293b" stroke-width="1.5"/>
  <text x="16" y="124" font-size="12" font-family="sans-serif" fill="#1e293b" text-anchor="middle">U1</text>

  <!-- Zuleitung -> Knoten C1 -->
  <line x1="38" y1="70" x2="58" y2="70" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="58" cy="70" r="2.5" fill="#1e293b"/>

  <!-- C1 (Eingangsfilter, parallel gegen Schiene unten) -->
  <line x1="58" y1="70" x2="58" y2="90" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="44" y1="90" x2="72" y2="90" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="44" y1="100" x2="72" y2="100" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="58" y1="100" x2="58" y2="170" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <text x="38" y="98" font-size="11" font-family="sans-serif" fill="#1e293b" text-anchor="middle">C1</text>

  <!-- L1 (aussen links, in Serie zum Anschluss) -->
  <line x1="58" y1="70" x2="78" y2="70" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 78,70 A 8,8 0 0 1 94,70 A 8,8 0 0 1 110,70 A 8,8 0 0 1 126,70"
        fill="none" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="126" y1="70" x2="146" y2="70" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <text x="102" y="57" font-size="11" font-family="sans-serif" fill="#1e293b" text-anchor="middle">L1</text>

  <!-- Knoten A (Mittelpunkt linke Halbbruecke) -->
  <circle cx="146" cy="70" r="2.5" fill="#1e293b"/>

  <!-- S1 (Knoten A -> gemeinsame obere Schiene/Knoten T) -->
  <line x1="146" y1="70" x2="146" y2="58" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="146" cy="58" r="2" fill="#1e293b"/>
  <line x1="146" y1="58" x2="158" y2="46" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="161" cy="43" r="2.5" fill="white" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="161" y1="40" x2="161" y2="25" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <text x="133" y="48" font-size="11" font-family="sans-serif" fill="#1e293b" text-anchor="middle">S1</text>

  <!-- S3 (Knoten A -> gemeinsame untere Schiene/GND) -->
  <line x1="146" y1="70" x2="146" y2="82" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="146" cy="82" r="2" fill="#1e293b"/>
  <line x1="146" y1="82" x2="158" y2="94" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="161" cy="97" r="2.5" fill="white" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="161" y1="100" x2="161" y2="170" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <text x="133" y="103" font-size="11" font-family="sans-serif" fill="#1e293b" text-anchor="middle">S3</text>

  <!-- gemeinsame obere Schiene (Knoten T) -->
  <line x1="161" y1="25" x2="287" y2="25" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="161" cy="25" r="2.5" fill="#1e293b"/>
  <circle cx="224" cy="25" r="2.5" fill="#1e293b"/>
  <circle cx="287" cy="25" r="2.5" fill="#1e293b"/>

  <!-- C2 (DC-Zwischenkreiskondensator, mittig zwischen den beiden Halbbruecken) -->
  <line x1="224" y1="25" x2="224" y2="78" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="210" y1="78" x2="238" y2="78" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="210" y1="88" x2="238" y2="88" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="224" y1="88" x2="224" y2="170" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <text x="244" y="83" font-size="11" font-family="sans-serif" fill="#1e293b" text-anchor="middle">C2</text>

  <!-- Knoten B (Mittelpunkt rechte Halbbruecke) -->
  <circle cx="300" cy="70" r="2.5" fill="#1e293b"/>

  <!-- S2 (gemeinsame obere Schiene/Knoten T -> Knoten B) -->
  <line x1="300" y1="70" x2="300" y2="58" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="300" cy="58" r="2" fill="#1e293b"/>
  <line x1="300" y1="58" x2="288" y2="46" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="287" cy="43" r="2.5" fill="white" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="287" y1="40" x2="287" y2="25" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <text x="313" y="48" font-size="11" font-family="sans-serif" fill="#1e293b" text-anchor="middle">S2</text>

  <!-- S4 (Knoten B -> gemeinsame untere Schiene/GND) -->
  <line x1="300" y1="70" x2="300" y2="82" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="300" cy="82" r="2" fill="#1e293b"/>
  <line x1="300" y1="82" x2="288" y2="94" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="287" cy="97" r="2.5" fill="white" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="287" y1="100" x2="287" y2="170" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <text x="313" y="103" font-size="11" font-family="sans-serif" fill="#1e293b" text-anchor="middle">S4</text>

  <!-- L2 (aussen rechts, in Serie zum Anschluss) -->
  <line x1="300" y1="70" x2="320" y2="70" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 320,70 A 8,8 0 0 1 336,70 A 8,8 0 0 1 352,70 A 8,8 0 0 1 368,70"
        fill="none" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="368" y1="70" x2="388" y2="70" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <text x="344" y="57" font-size="11" font-family="sans-serif" fill="#1e293b" text-anchor="middle">L2</text>

  <!-- Knoten C3 -->
  <circle cx="388" cy="70" r="2.5" fill="#1e293b"/>

  <!-- C3 (Ausgangsfilter, parallel gegen Schiene unten) -->
  <line x1="388" y1="70" x2="388" y2="90" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="374" y1="90" x2="402" y2="90" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="374" y1="100" x2="402" y2="100" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="388" y1="100" x2="388" y2="170" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <text x="408" y="98" font-size="11" font-family="sans-serif" fill="#1e293b" text-anchor="middle">C3</text>

  <line x1="388" y1="70" x2="442" y2="70" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- U2 Anschluss rechts -->
  <circle cx="445" cy="70" r="3" fill="white" stroke="#1e293b" stroke-width="1.5"/>
  <circle cx="445" cy="170" r="3" fill="white" stroke="#1e293b" stroke-width="1.5"/>
  <text x="464" y="124" font-size="12" font-family="sans-serif" fill="#1e293b" text-anchor="middle">U2</text>

  <!-- gemeinsame untere Schiene (GND/Common) -->
  <line x1="38" y1="170" x2="442" y2="170" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="58" cy="170" r="2.5" fill="#1e293b"/>
  <circle cx="161" cy="170" r="2.5" fill="#1e293b"/>
  <circle cx="224" cy="170" r="2.5" fill="#1e293b"/>
  <circle cx="287" cy="170" r="2.5" fill="#1e293b"/>
  <circle cx="388" cy="170" r="2.5" fill="#1e293b"/>

  <!-- GND-Symbol -->
  <line x1="224" y1="170" x2="224" y2="180" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="209" y1="180" x2="239" y2="180" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
  <text x="224" y="198" text-anchor="middle" font-family="monospace" font-size="13" fill="#1e293b">GND</text>

  <!-- Hinweis: Leistungsfluss bidirektional -->
  <line x1="180" y1="52" x2="270" y2="52" stroke="#dc2626" stroke-width="1.3" stroke-dasharray="3,2"/>
  <text x="224" y="44" font-size="10" font-family="sans-serif" fill="#dc2626" text-anchor="middle">Leistungsfluss bidirektional</text>

</svg>
