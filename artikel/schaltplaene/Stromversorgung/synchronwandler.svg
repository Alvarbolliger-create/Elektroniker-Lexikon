<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 270" width="460" height="270">
  <defs>
    <marker id="pfeil" markerWidth="8" markerHeight="8" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- U_E Quelle -->
  <line x1="50" y1="35" x2="50" y2="52" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="50" cy="70" r="18" fill="none" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="50" y1="56" x2="50" y2="84" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="61" x2="46" y2="61" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="43" y1="58" x2="43" y2="64" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="50" y1="88" x2="50" y2="225" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <text x="26" y="74" font-size="11" font-family="sans-serif" fill="#1e293b" text-anchor="middle">U_E</text>

  <!-- obere Schiene zu S1 -->
  <line x1="50" y1="35" x2="120" y2="35" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- S1 High-Side-Schalter (offen dargestellt) -->
  <circle cx="120" cy="35" r="2" fill="#1e293b"/>
  <line x1="120" y1="35" x2="152" y2="22" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="158" cy="35" r="2.5" fill="white" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="160" y1="35" x2="190" y2="35" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <text x="138" y="12" font-size="11" font-family="sans-serif" fill="#1e293b" text-anchor="middle">S1</text>

  <!-- Schaltknoten SW -->
  <circle cx="190" cy="35" r="2.5" fill="#1e293b"/>
  <text x="174" y="48" font-size="10" font-family="sans-serif" fill="#1e293b" text-anchor="middle">SW</text>

  <!-- S2 Low-Side-Schalter (ersetzt die Freilaufdiode des Buck-Wandlers) -->
  <line x1="190" y1="35" x2="190" y2="80" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="190" cy="80" r="2" fill="#1e293b"/>
  <line x1="190" y1="80" x2="208" y2="106" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="190" cy="118" r="2.5" fill="white" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="190" y1="120" x2="190" y2="225" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <text x="214" y="100" font-size="11" font-family="sans-serif" fill="#1e293b" text-anchor="middle">S2</text>

  <!-- L Speicherdrossel -->
  <line x1="190" y1="35" x2="220" y2="35" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 220,35 A 8,8 0 0 1 236,35 A 8,8 0 0 1 252,35 A 8,8 0 0 1 268,35 A 8,8 0 0 1 284,35"
        fill="none" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="284" y1="35" x2="320" y2="35" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <text x="252" y="18" font-size="11" font-family="sans-serif" fill="#1e293b" text-anchor="middle">L</text>

  <!-- Knoten Ausgang -->
  <circle cx="320" cy="35" r="2.5" fill="#1e293b"/>

  <!-- C Ausgangskondensator (polarisiert) -->
  <line x1="320" y1="35" x2="320" y2="70" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="305" y1="70" x2="335" y2="70" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="305" y1="84" x2="335" y2="84" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>
  <text x="296" y="68" font-size="11" font-family="sans-serif" fill="#1e293b" text-anchor="middle">+</text>
  <line x1="320" y1="84" x2="320" y2="225" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <text x="343" y="80" font-size="11" font-family="sans-serif" fill="#1e293b" text-anchor="middle">C</text>

  <!-- R_L Last -->
  <circle cx="370" cy="35" r="2.5" fill="#1e293b"/>
  <line x1="320" y1="35" x2="370" y2="35" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="370" y1="35" x2="370" y2="70" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="360" y="70" width="20" height="40" fill="none" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="370" y1="110" x2="370" y2="225" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <text x="388" y="93" font-size="11" font-family="sans-serif" fill="#1e293b" text-anchor="middle">R_L</text>

  <!-- GND Schiene -->
  <line x1="50" y1="225" x2="370" y2="225" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="190" y1="225" x2="190" y2="235" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="175" y1="235" x2="205" y2="235" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
  <text x="190" y="253" text-anchor="middle" font-family="monospace" font-size="14" fill="#1e293b">GND</text>

  <!-- U_A Spannungspfeil (blau) -->
  <line x1="398" y1="38" x2="398" y2="222" stroke="#2563eb" stroke-width="1.5" marker-end="url(#pfeil)"/>
  <text x="404" y="135" font-size="13" font-family="sans-serif" fill="#2563eb">U_A</text>

</svg>
