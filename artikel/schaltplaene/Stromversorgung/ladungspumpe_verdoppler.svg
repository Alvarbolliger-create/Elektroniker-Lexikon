<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 230" width="480" height="230">
  <defs>
    <marker id="pfeil" markerWidth="8" markerHeight="8" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- U_E Pfeil + Label -->
  <line x1="30" y1="34" x2="30" y2="176" stroke="#2563eb" stroke-width="1.5" marker-end="url(#pfeil)"/>
  <text x="16" y="108" font-size="13" font-family="sans-serif" fill="#2563eb" text-anchor="middle">U_E</text>

  <!-- Eingang "+" -->
  <circle cx="55" cy="30" r="3" fill="white" stroke="#1e293b" stroke-width="1.5"/>
  <text x="42" y="34" font-size="13" font-family="sans-serif" fill="#1e293b" text-anchor="middle">+</text>
  <line x1="58" y1="30" x2="78" y2="30" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Knoten P (Abgriff U_E+) -->
  <circle cx="78" cy="30" r="2.5" fill="#1e293b"/>

  <!-- D1 -->
  <line x1="78" y1="30" x2="96" y2="30" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="96" y1="20" x2="96" y2="40" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="126" y1="20" x2="126" y2="40" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="96" y1="20" x2="126" y2="30" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="96" y1="40" x2="126" y2="30" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="126" y1="30" x2="148" y2="30" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <text x="111" y="14" font-size="11" font-family="sans-serif" fill="#1e293b" text-anchor="middle">D1</text>

  <!-- Knoten A -->
  <circle cx="148" cy="30" r="2.5" fill="#1e293b"/>
  <text x="148" y="46" font-size="10" font-family="sans-serif" fill="#1e293b" text-anchor="middle">A</text>

  <!-- D2 -->
  <line x1="148" y1="30" x2="168" y2="30" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="168" y1="20" x2="168" y2="40" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="198" y1="20" x2="198" y2="40" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="168" y1="20" x2="198" y2="30" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="168" y1="40" x2="198" y2="30" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="198" y1="30" x2="221" y2="30" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <text x="183" y="14" font-size="11" font-family="sans-serif" fill="#1e293b" text-anchor="middle">D2</text>

  <!-- Knoten B -->
  <circle cx="221" cy="30" r="2.5" fill="#1e293b"/>
  <text x="221" y="46" font-size="10" font-family="sans-serif" fill="#1e293b" text-anchor="middle">B</text>
  <line x1="221" y1="30" x2="417" y2="30" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Ausgang "+" -->
  <circle cx="420" cy="30" r="3" fill="white" stroke="#1e293b" stroke-width="1.5"/>
  <text x="434" y="34" font-size="13" font-family="sans-serif" fill="#1e293b" text-anchor="middle">+</text>

  <!-- C1 (unpolarisiert, vertikal von Knoten A zum Schalter-Pol) -->
  <line x1="148" y1="30" x2="148" y2="93" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="134" y1="93" x2="162" y2="93" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="134" y1="103" x2="162" y2="103" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="148" y1="103" x2="148" y2="118" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <text x="172" y="102" font-size="11" font-family="sans-serif" fill="#1e293b" text-anchor="middle">C1</text>

  <!-- C2 (unpolarisiert, vertikal von Knoten B zur unteren Schiene) -->
  <line x1="221" y1="30" x2="221" y2="93" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="207" y1="93" x2="235" y2="93" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="207" y1="103" x2="235" y2="103" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="221" y1="103" x2="221" y2="180" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <text x="245" y="102" font-size="11" font-family="sans-serif" fill="#1e293b" text-anchor="middle">C2</text>

  <!-- Schalter S: Kontakt "+", Pol, Kontakt "-" -->
  <line x1="78" y1="30" x2="78" y2="65" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="78" cy="68" r="2.5" fill="white" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="80" y1="71" x2="111" y2="116" stroke="#1e293b" stroke-width="1.2" stroke-dasharray="3,2"/>

  <circle cx="113" cy="118" r="2" fill="#1e293b"/>
  <line x1="111" y1="120" x2="80" y2="146" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="78" cy="149" r="2.5" fill="white" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="78" y1="152" x2="78" y2="180" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <text x="126" y="106" font-size="11" font-family="sans-serif" fill="#1e293b" text-anchor="middle">S</text>

  <!-- Pol-Ausgang zu C1 -->
  <line x1="113" y1="118" x2="148" y2="118" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- untere Schiene -->
  <line x1="58" y1="180" x2="417" y2="180" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="78" cy="180" r="2.5" fill="#1e293b"/>

  <!-- Eingang "-" -->
  <circle cx="55" cy="180" r="3" fill="white" stroke="#1e293b" stroke-width="1.5"/>
  <text x="42" y="184" font-size="13" font-family="sans-serif" fill="#1e293b" text-anchor="middle">−</text>

  <!-- Ausgang "-" -->
  <circle cx="420" cy="180" r="3" fill="white" stroke="#1e293b" stroke-width="1.5"/>
  <text x="434" y="184" font-size="13" font-family="sans-serif" fill="#1e293b" text-anchor="middle">−</text>

  <!-- GND -->
  <circle cx="270" cy="180" r="2.5" fill="#1e293b"/>
  <line x1="270" y1="180" x2="270" y2="190" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="255" y1="190" x2="285" y2="190" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
  <text x="270" y="208" text-anchor="middle" font-family="monospace" font-size="13" fill="#1e293b">GND</text>

  <!-- U_A Pfeil + Label -->
  <line x1="450" y1="34" x2="450" y2="176" stroke="#2563eb" stroke-width="1.5" marker-end="url(#pfeil)"/>
  <text x="464" y="108" font-size="13" font-family="sans-serif" fill="#2563eb" text-anchor="middle">U_A</text>

</svg>
